# ═══════════════════════════════════════════════════════════
#  Olympus Services — netlify.toml
#  SEO + Security + Performance headers for Netlify deployment
# ═══════════════════════════════════════════════════════════

[build]
  publish = "."
functions = "netlify/functions"
# ── Global security & SEO headers ──────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://www.google-analytics.com; frame-ancestors 'self';"

# ── HTML — short cache, always revalidate (SEO: always fresh) ──
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── Root index ─────────────────────────────────────────────
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── Sitemap & robots — short cache ─────────────────────────
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "application/xml; charset=UTF-8"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "text/plain; charset=UTF-8"

# ── Static assets — long cache ─────────────────────────────
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Redirects ──────────────────────────────────────────────
# Force www → non-www  (remove or reverse if you prefer www)
[[redirects]]
  from = "https://www.olympusservices.net/*"
  to = "https://olympusservices.net/:splat"
  status = 301
  force = true

# HTTP → HTTPS handled automatically by Netlify, but explicit:
[[redirects]]
  from = "http://olympusservices.net/*"
  to = "https://olympusservices.net/:splat"
  status = 301
  force = true

[functions]
  directory = "netlify/functions"



